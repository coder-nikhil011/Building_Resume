<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder - Build Your Professional Resume in Minutes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Resume Builder</h1>
            <p class="tagline">Build Your Professional Resume in Minutes</p>
        </header>

        <div class="main-content">
            <!-- Resume Form Section -->
            <div class="form-section">
                <h2>Build Your Resume</h2>
                
                <!-- Personal Information -->
                <div class="section-card">
                    <h3>Personal Information</h3>
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" placeholder="john.doe@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" placeholder="+1 (555) 123-4567">
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" placeholder="New York, NY">
                    </div>
                    <div class="form-group">
                        <label for="linkedin">LinkedIn</label>
                        <input type="url" id="linkedin" placeholder="linkedin.com/in/johndoe">
                    </div>
                    <div class="form-group">
                        <label for="website">Website/Portfolio</label>
                        <input type="url" id="website" placeholder="https://johndoe.com">
                    </div>
                </div>

                <!-- Professional Summary -->
                <div class="section-card">
                    <h3>Professional Summary</h3>
                    <div class="form-group">
                        <label for="summary">Summary *</label>
                        <textarea id="summary" rows="4" placeholder="Brief professional summary highlighting your key skills and experience..." required></textarea>
                    </div>
                </div>

                <!-- Work Experience -->
                <div class="section-card">
                    <h3>Work Experience</h3>
                    <div id="experienceContainer"></div>
                    <button type="button" class="btn-add" onclick="addExperience()">+ Add Experience</button>
                </div>

                <!-- Education -->
                <div class="section-card">
                    <h3>Education</h3>
                    <div id="educationContainer"></div>
                    <button type="button" class="btn-add" onclick="addEducation()">+ Add Education</button>
                </div>

                <!-- Skills -->
                <div class="section-card">
                    <h3>Skills</h3>
                    <div class="form-group">
                        <label for="skills">Skills (comma-separated) *</label>
                        <textarea id="skills" rows="3" placeholder="JavaScript, Python, React, Node.js, SQL, Project Management" required></textarea>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button type="button" class="btn-primary" onclick="generateResume()">Generate Resume</button>
                    <button type="button" class="btn-secondary" onclick="analyzeResume()">Analyze Resume</button>
                    <button type="button" class="btn-secondary" onclick="clearForm()">Clear Form</button>
                </div>
            </div>

            <!-- Preview and Analysis Section -->
            <div class="preview-section">
                <!-- Resume Preview -->
                <div class="preview-card" id="previewCard" style="display: none;">
                    <div class="preview-header">
                        <h2>Resume Preview</h2>
                        <div class="preview-actions">
                            <button class="btn-small" onclick="exportToPDF()">📄 Export PDF</button>
                            <button class="btn-small" onclick="exportToJSON()">💾 Save JSON</button>
                        </div>
                    </div>
                    <div id="resumePreview" class="resume-preview"></div>
                </div>

                <!-- Analysis Results -->
                <div class="analysis-card" id="analysisCard" style="display: none;">
                    <h2>Resume Analysis</h2>
                    <div id="analysisResults"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
